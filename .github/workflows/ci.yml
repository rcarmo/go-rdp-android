name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Go vet
        run: go vet ./...
      - name: Go coverage
        run: make coverage COVERAGE_MIN=75.0
      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.func.txt
      - name: Build Go packages
        run: go build ./...
      - name: End-to-end mock/probe smoke test
        run: |
          set -euo pipefail
          go run ./cmd/mock-server >mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true; cat mock-server.log' EXIT
          sleep 2
          mkdir -p protocol-trace
          go run ./cmd/probe -trace-dir protocol-trace
      - name: Upload protocol trace
        uses: actions/upload-artifact@v4
        with:
          name: mock-probe-protocol-trace
          path: protocol-trace/*.hex

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Inspect debug APK
        run: make check-apk-artifact
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  gomobile:
    name: Go mobile AAR build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Initialize gomobile
        run: gomobile init
      - name: Build mobile AAR
        run: make gomobile-bind
      - name: Verify mobile AAR API
        run: make check-aar-api
      - name: Inspect mobile AAR
        run: make check-aar-artifact
      - name: Build APK with Go AAR
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Inspect Go-backed APK
        run: make check-apk-artifact REQUIRE_GO_LIBS=1
      - name: Upload mobile AAR
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-mobile-aar
          path: android/app/libs/mobile.aar
      - name: Upload Go-backed debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-go-backed-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  freerdp-compat:
    name: FreeRDP compatibility probe
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Install FreeRDP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y freerdp2-x11 xvfb || sudo apt-get install -y freerdp3-x11 xvfb
      - name: Probe mock server with xfreerdp
        run: |
          set -u
          mkdir -p freerdp-artifacts
          go run ./cmd/mock-server >freerdp-artifacts/mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          sleep 2
          set +e
          timeout 20s xvfb-run -a xfreerdp /v:127.0.0.1:3390 /sec:rdp /cert:ignore /log-level:TRACE >freerdp-artifacts/xfreerdp.log 2>&1
          code=$?
          set -e
          echo "$code" > freerdp-artifacts/exit-code.txt
          cat freerdp-artifacts/xfreerdp.log | tail -n 120
          # Compatibility probe is informational until the server satisfies full real-client RDP.
          exit 0
      - name: Upload FreeRDP probe logs
        uses: actions/upload-artifact@v4
        with:
          name: freerdp-compat-probe
          path: freerdp-artifacts/*

  android-emulator:
    name: Android emulator smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Install and launch on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n pt.taoofmac.gordpandroid/.MainActivity
            adb shell pidof pt.taoofmac.gordpandroid

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Go vet
        run: go vet ./...
      - name: Go tests
        run: go test ./... -count=1
      - name: Build Go packages
        run: go build ./...
      - name: End-to-end mock/probe smoke test
        run: |
          set -euo pipefail
          go run ./cmd/mock-server >mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true; cat mock-server.log' EXIT
          sleep 2
          go run ./cmd/probe

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  gomobile:
    name: Go mobile AAR build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Initialize gomobile
        run: gomobile init
      - name: Build mobile AAR
        run: make gomobile-bind
      - name: Build APK with Go AAR
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Upload mobile AAR
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-mobile-aar
          path: android/app/libs/mobile.aar
      - name: Upload Go-backed debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-go-backed-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  android-emulator:
    name: Android emulator smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug
      - name: Install and launch on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n pt.taoofmac.gordpandroid/.MainActivity
            adb shell pidof pt.taoofmac.gordpandroid

name: CI

on:
  push:
    branches: [ main, master ]
    tags:
      - '*-ux'
      - '*-build'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      emulator_api_level:
        description: Android emulator API level
        required: false
        default: '35'
      emulator_go_backed:
        description: Build and install Go-backed APK on emulator
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      emulator_capture:
        description: Request MediaProjection and capture the emulator screen via RDP
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      emulator_capture_scale:
        description: MediaProjection downscale factor for RDP capture
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4']

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-cleanup:
    name: Release artifact cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Prune previous GitHub Actions artifacts for release tags
        if: ${{ startsWith(github.ref_name, 'v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "Release tag ${GITHUB_REF_NAME}: pruning pre-existing Actions artifacts before publishing release files"
          deleted=0
          while :; do
            json=$(gh api "repos/$REPO/actions/artifacts?per_page=100&page=1")
            mapfile -t artifacts < <(jq -r --argjson run_id "$RUN_ID" '.artifacts[] | select(.workflow_run.id != $run_id) | [.id, .name, .workflow_run.id] | @tsv' <<<"$json")
            [ "${#artifacts[@]}" -gt 0 ] || break
            for artifact in "${artifacts[@]}"; do
              IFS=$'\t' read -r id name run <<<"$artifact"
              [ -n "$id" ] || continue
              echo "Deleting artifact id=$id name=$name run=$run"
              gh api -X DELETE "repos/$REPO/actions/artifacts/$id"
              echo "$id" >> /tmp/deleted-artifacts.txt
            done
          done
          if [ -f /tmp/deleted-artifacts.txt ]; then
            deleted=$(wc -l </tmp/deleted-artifacts.txt | tr -d ' ')
          fi
          echo "Deleted $deleted previous artifact(s)"

  go:
    needs: release-cleanup
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Go vet
        run: go vet ./...
      - name: Go coverage
        run: |
          mkdir -p test-artifacts/go
          make coverage COVERAGE_MIN=75.0 | tee test-artifacts/go/coverage.log
          cp coverage.out coverage.func.txt test-artifacts/go/
      - name: RDPEI/drdynvc test summary
        run: |
          mkdir -p test-artifacts/go .gotmp
          GOTMPDIR="$PWD/.gotmp" go test -json ./internal/input ./internal/rdpserver > test-artifacts/go/rdpei-tests.json
          GOTMPDIR="$PWD/.gotmp" go run ./scripts/summarize-rdpei-tests.go test-artifacts/go/rdpei-tests.json test-artifacts/go/rdpei-test-summary.md
          test -s test-artifacts/go/rdpei-test-summary.md
      - name: Upload Go test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-test-artifacts
          path: test-artifacts/go/**
      - name: Build Go packages
        run: go build ./...
      - name: End-to-end mock/probe smoke test
        run: |
          set -euo pipefail
          mkdir -p test-artifacts/mock-probe/protocol-trace
          GO_RDP_ANDROID_TRACE=1 go run ./cmd/mock-server >test-artifacts/mock-probe/mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true; cat test-artifacts/mock-probe/mock-server.log' EXIT
          sleep 2
          go run ./cmd/probe -trace-dir test-artifacts/mock-probe/protocol-trace -summary test-artifacts/mock-probe/probe-summary.json >test-artifacts/mock-probe/probe.log 2>&1
          find test-artifacts/mock-probe/protocol-trace -type f | sort >test-artifacts/mock-probe/protocol-trace/index.txt
      - name: Authentication smoke test
        run: |
          set -euo pipefail
          mkdir -p test-artifacts/auth
          mkdir -p .gotmp
          GOTMPDIR="$PWD/.gotmp" go run ./cmd/mock-server -addr 127.0.0.1:3398 -username rui -password secret >test-artifacts/auth/mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true; cat test-artifacts/auth/mock-server.log' EXIT
          sleep 2
          GOTMPDIR="$PWD/.gotmp" go run ./cmd/probe -addr 127.0.0.1:3398 -username rui -password secret -summary test-artifacts/auth/probe-good-summary.json >test-artifacts/auth/probe-good.log 2>&1
          GOTMPDIR="$PWD/.gotmp" go run ./cmd/probe -addr 127.0.0.1:3398 -nla -username rui -password secret -summary test-artifacts/auth/probe-nla-good-summary.json >test-artifacts/auth/probe-nla-good.log 2>&1
          set +e
          GOTMPDIR="$PWD/.gotmp" go run ./cmd/probe -addr 127.0.0.1:3398 -username rui -password wrong -summary test-artifacts/auth/probe-bad-summary.json >test-artifacts/auth/probe-bad.log 2>&1
          bad_status=$?
          GOTMPDIR="$PWD/.gotmp" go run ./cmd/probe -addr 127.0.0.1:3398 -nla -username rui -password wrong -summary test-artifacts/auth/probe-nla-bad-summary.json >test-artifacts/auth/probe-nla-bad.log 2>&1
          nla_bad_status=$?
          set -e
          echo "$bad_status" > test-artifacts/auth/probe-bad-exit-code.txt
          echo "$nla_bad_status" > test-artifacts/auth/probe-nla-bad-exit-code.txt
          test "$bad_status" -ne 0
          test "$nla_bad_status" -ne 0
          grep -q 'selected=0x00000001' test-artifacts/auth/mock-server.log
          grep -q 'selected=0x00000002' test-artifacts/auth/mock-server.log
          grep -q 'auth failed' test-artifacts/auth/mock-server.log
          grep -q 'NLA/CredSSP authenticated' test-artifacts/auth/mock-server.log
          grep -q 'NLA/CredSSP failed' test-artifacts/auth/mock-server.log
      - name: Upload protocol smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mock-probe-artifacts
          path: |
            test-artifacts/mock-probe/**
            test-artifacts/auth/**

  go-race-fuzz:
    name: Go race and fuzz smoke
    needs: release-cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Race tests
        run: go test -race ./...
      - name: Fuzz parser smoke
        run: go test ./internal/rdpserver -run=Fuzz -fuzz=FuzzParseX224Data -fuzztime=10s

  android:
    name: Android debug build
    needs: release-cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Build debug APK
        working-directory: android
        run: |
          set -o pipefail
          gradle :app:assembleDebug | tee ../android-build.log
      - name: Inspect debug APK
        run: |
          mkdir -p test-artifacts/android
          make check-apk-artifact | tee test-artifacts/android/apk-inspection.log
          cp android-build.log test-artifacts/android/
          APK_PATH="$(find android/app/build/outputs/apk -type f -name '*debug*.apk' | sort | head -n1)"
          test -n "$APK_PATH"
          unzip -l "$APK_PATH" >test-artifacts/android/apk-contents.txt
          mkdir -p .gotmp
          GOTMPDIR="$PWD/.gotmp" go run ./scripts/summarize-android-artifact.go apk "$APK_PATH" test-artifacts/android/apk-summary.md
          test -s test-artifacts/android/apk-summary.md
      - name: Upload Android build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: test-artifacts/android/**
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  gomobile:
    name: Go mobile AAR build
    needs: release-cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Initialize gomobile
        run: gomobile init
      - name: Build mobile AAR
        run: make gomobile-bind
      - name: Verify mobile AAR API
        run: |
          mkdir -p test-artifacts/gomobile
          make check-aar-api | tee test-artifacts/gomobile/aar-api.log
      - name: Inspect mobile AAR
        run: |
          make check-aar-artifact | tee test-artifacts/gomobile/aar-inspection.log
          unzip -l android/app/libs/mobile.aar >test-artifacts/gomobile/aar-contents.txt
          mkdir -p .gotmp
          GOTMPDIR="$PWD/.gotmp" go run ./scripts/summarize-android-artifact.go aar android/app/libs/mobile.aar test-artifacts/gomobile/aar-summary.md
          test -s test-artifacts/gomobile/aar-summary.md
      - name: Build APK with Go AAR
        working-directory: android
        run: |
          set -o pipefail
          gradle :app:assembleDebug | tee ../gomobile-android-build.log
      - name: Inspect Go-backed APK
        run: |
          make check-apk-artifact REQUIRE_GO_LIBS=1 | tee test-artifacts/gomobile/go-backed-apk-inspection.log
          cp gomobile-android-build.log test-artifacts/gomobile/
          APK_PATH="$(find android/app/build/outputs/apk -type f -name '*debug*.apk' | sort | head -n1)"
          test -n "$APK_PATH"
          unzip -l "$APK_PATH" >test-artifacts/gomobile/go-backed-apk-contents.txt
          mkdir -p .gotmp
          GOTMPDIR="$PWD/.gotmp" go run ./scripts/summarize-android-artifact.go apk "$APK_PATH" test-artifacts/gomobile/go-backed-apk-summary.md
          test -s test-artifacts/gomobile/go-backed-apk-summary.md
      - name: Upload gomobile build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gomobile-build-artifacts
          path: test-artifacts/gomobile/**
      - name: Upload mobile AAR
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-mobile-aar
          path: android/app/libs/mobile.aar
      - name: Upload Go-backed debug APK
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-go-backed-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

  freerdp-compat:
    name: FreeRDP compatibility probe
    needs: release-cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Install FreeRDP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y freerdp2-x11 xvfb x11-apps imagemagick || sudo apt-get install -y freerdp3-x11 xvfb x11-apps imagemagick
      - name: Probe mock server with xfreerdp and capture X11 screenshot
        run: |
          set -euo pipefail
          mkdir -p freerdp-artifacts .gotmp
          GOTMPDIR="$PWD/.gotmp" go mod download
          GOTMPDIR="$PWD/.gotmp" go build -o freerdp-artifacts/mock-server ./cmd/mock-server
          GO_RDP_ANDROID_TRACE=1 ./freerdp-artifacts/mock-server -test-pattern -width 320 -height 240 -fps 5 -username runner -password secret >freerdp-artifacts/mock-server.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          for _ in $(seq 1 50); do
            if grep -q 'listening on' freerdp-artifacts/mock-server.log; then
              break
            fi
            sleep 0.2
          done
          grep -q 'listening on' freerdp-artifacts/mock-server.log

          run_freerdp_mode() {
            mode="$1"
            pass=0
            best_attempt=0
            mkdir -p "freerdp-artifacts/${mode}"
            for attempt in 1 2 3; do
              dir="freerdp-artifacts/${mode}/attempt-${attempt}"
              mkdir -p "$dir"
              echo "FreeRDP ${mode} attempt ${attempt}" | tee "$dir/attempt.txt"
              set +e
              xvfb-run -a bash -c "
                set +e
                xfreerdp /v:127.0.0.1:3390 /sec:${mode} /cert:ignore /u:runner /p:secret /log-level:TRACE >'$dir/xfreerdp.log' 2>&1 &
                rdp_pid=\$!
                sleep 8
                xwd -root -silent -out '$dir/xfreerdp-root.xwd' 2>'$dir/xwd.log'
                (convert '$dir/xfreerdp-root.xwd' '$dir/xfreerdp-root.png' || magick '$dir/xfreerdp-root.xwd' '$dir/xfreerdp-root.png') >'$dir/convert.log' 2>&1
                if kill -0 \$rdp_pid >/dev/null 2>&1; then
                  kill -INT \$rdp_pid >/dev/null 2>&1 || true
                fi
                wait \$rdp_pid
                echo \$? > '$dir/exit-code.txt'
              "
              xvfb_status=$?
              set -e
              echo "$xvfb_status" > "$dir/xvfb-exit-code.txt"
              cp freerdp-artifacts/mock-server.log "$dir/mock-server.log"
              GOTMPDIR="$PWD/.gotmp" go run ./scripts/summarize-freerdp.go "$dir"
              cat "$dir/summary.md"
              if jq -e '.bitmap_seen == true and .active_seen == true and .screenshot_png == true and .exit_code != "124"' "$dir/summary.json" >/dev/null; then
                pass=1
                best_attempt=$attempt
                cp "$dir/summary.md" "freerdp-artifacts/${mode}-summary.md"
                cp "$dir/summary.json" "freerdp-artifacts/${mode}-summary.json"
                if [ "$mode" = "rdp" ]; then
                  cp "$dir"/* freerdp-artifacts/
                fi
                break
              fi
              best_attempt=$attempt
              sleep 1
            done

            echo "$best_attempt" > "freerdp-artifacts/${mode}/best-attempt.txt"
            if [ "$pass" -ne 1 ]; then
              cp "freerdp-artifacts/${mode}/attempt-${best_attempt}/summary.md" "freerdp-artifacts/${mode}-summary.md" || true
              cp "freerdp-artifacts/${mode}/attempt-${best_attempt}/summary.json" "freerdp-artifacts/${mode}-summary.json" || true
              echo "FreeRDP ${mode} compatibility gate failed: no attempt reached active bitmap streaming plus non-timeout clean disconnect" >&2
              tail -n 160 "freerdp-artifacts/${mode}/attempt-${best_attempt}/xfreerdp.log" || true
              exit 1
            fi
          }

          run_freerdp_mode rdp
          run_freerdp_mode tls
          run_freerdp_mode nla
          test -s freerdp-artifacts/rdp-summary.md
          test -s freerdp-artifacts/tls-summary.md
          test -s freerdp-artifacts/nla-summary.md
          cat freerdp-artifacts/rdp-summary.md
          cat freerdp-artifacts/tls-summary.md
          cat freerdp-artifacts/nla-summary.md
      - name: Upload FreeRDP probe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freerdp-compat-probe
          path: freerdp-artifacts/**

  android-emulator:
    name: Android emulator smoke
    needs: release-cleanup
    if: ${{ github.event_name == 'workflow_dispatch' || endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build debug APK
        working-directory: android
        run: |
          if [ "${{ inputs.emulator_go_backed || ((endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v')) && 'true') || 'false' }}" = "true" ]; then
            go install golang.org/x/mobile/cmd/gomobile@latest
            echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
            gomobile init
            cd .. && make gomobile-bind && cd android
          fi
          gradle :app:assembleDebug
      - name: Install and launch on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.emulator_api_level || '35' }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: EMULATOR_GO_BACKED='${{ inputs.emulator_go_backed || ((endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v')) && 'true') || 'false' }}' EMULATOR_CAPTURE='${{ inputs.emulator_capture || ((endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v')) && 'true') || 'false' }}' EMULATOR_CAPTURE_SCALE='${{ inputs.emulator_capture_scale || '2' }}' bash scripts/emulator-smoke.sh
      - uses: actions/setup-node@v4
        if: ${{ (inputs.emulator_go_backed == 'true' && inputs.emulator_capture == 'true') || endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v') }}
        with:
          node-version: '22'
          cache: npm
      - name: Install Playwright UX report dependencies
        if: ${{ (inputs.emulator_go_backed == 'true' && inputs.emulator_capture == 'true') || endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v') }}
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Generate Gherkin/Playwright UX PDF report
        if: ${{ (inputs.emulator_go_backed == 'true' && inputs.emulator_capture == 'true') || endsWith(github.ref_name, '-ux') || startsWith(github.ref_name, 'v') }}
        run: npm run ux:report -- --artifacts emulator-artifacts --out emulator-artifacts/ux-report
      - name: Stage UX report for release tags
        if: ${{ startsWith(github.ref_name, 'v') }}
        run: |
          mkdir -p release-files
          cp emulator-artifacts/ux-report/ux-report.pdf "release-files/go-rdp-android-${{ github.ref_name }}-ux-report.pdf"
      - name: Upload release UX report
        if: ${{ startsWith(github.ref_name, 'v') }}
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-release-ux-report
          path: release-files/*.pdf
      - name: Upload emulator artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-artifacts
          path: emulator-artifacts/**


  release-files:
    name: Stage release files
    if: ${{ startsWith(github.ref_name, 'v') }}
    needs: [gomobile, android-emulator]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: go-rdp-android-go-backed-debug-apk
          path: downloaded/go-backed-apk
      - name: Download release UX report artifact
        uses: actions/download-artifact@v4
        with:
          name: go-rdp-android-release-ux-report
          path: downloaded/ux-report
      - name: Generate release notes, checksums, SBOM, and signature report
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-files
          apk=$(find downloaded/go-backed-apk -type f -name '*.apk' | head -1)
          pdf=$(find downloaded/ux-report -type f -name '*.pdf' | head -1)
          test -s "$apk"
          test -s "$pdf"
          cp "$apk" "release-files/go-rdp-android-${TAG}.apk"
          cp "$pdf" "release-files/go-rdp-android-${TAG}-ux-report.pdf"

          previous=$(git tag --sort=-v:refname 'v[0-9]*' | grep -v "^${TAG}$" | head -1 || true)
          {
            echo "# go-rdp-android ${TAG}"
            echo
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Release files"
            echo
            echo "- go-rdp-android-${TAG}.apk"
            echo "- go-rdp-android-${TAG}-ux-report.pdf"
            echo "- go-rdp-android-${TAG}-apk-signature.txt"
            echo "- go-rdp-android-${TAG}-sbom-go.cdx.json"
            echo "- go-rdp-android-${TAG}-sha256.txt"
            echo
            if [ -n "$previous" ]; then
              echo "## Commits since ${previous}"
              range="${previous}..${TAG}"
            else
              echo "## Commits"
              range="${TAG}"
            fi
            echo
            git log --no-merges --date=short --pretty=format:'- `%h` %ad %s ([commit](https://github.com/%REPO%/commit/%H))' "$range" | sed "s|%REPO%|${REPO}|g"
            echo
          } > "release-files/go-rdp-android-${TAG}-release-notes.md"

          jarsigner -verify -certs "release-files/go-rdp-android-${TAG}.apk" > "release-files/go-rdp-android-${TAG}-apk-signature.txt"

          mkdir -p .gotmp
          GOTMPDIR="$PWD/.gotmp" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0
          "$(go env GOPATH)/bin/cyclonedx-gomod" mod -licenses -json -output "release-files/go-rdp-android-${TAG}-sbom-go.cdx.json" .

          sha256sum \
            "release-files/go-rdp-android-${TAG}.apk" \
            "release-files/go-rdp-android-${TAG}-ux-report.pdf" \
            "release-files/go-rdp-android-${TAG}-release-notes.md" \
            "release-files/go-rdp-android-${TAG}-apk-signature.txt" \
            "release-files/go-rdp-android-${TAG}-sbom-go.cdx.json" \
            > "release-files/go-rdp-android-${TAG}-sha256.txt"

          ls -lh release-files
      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: go-rdp-android-release-files
          path: release-files/*
          retention-days: 180
      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes="release-files/go-rdp-android-${TAG}-release-notes.md"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "go-rdp-android ${TAG}" --notes-file "$notes"
          else
            gh release create "$TAG" --title "go-rdp-android ${TAG}" --notes-file "$notes"
          fi
          gh release upload "$TAG" release-files/* --clobber
